<div class="change-password-container">
  <div class="change-password-card">
    <h1>Cambia password</h1>
    <p class="subtitle">
      Al primo accesso devi impostare una nuova password personale.
    </p>

    <form [formGroup]="changePasswordForm" (ngSubmit)="onSubmit()">
      <div class="form-group">
        <label>Password attuale</label>
        <input type="password" formControlName="currentPassword" />

        <small
          *ngIf="
            changePasswordForm.get('currentPassword')?.touched &&
            changePasswordForm.get('currentPassword')?.invalid
          "
        >
          Password attuale obbligatoria
        </small>
      </div>

      <div class="form-group">
        <label>Nuova password</label>
        <input type="password" formControlName="newPassword" />

        <small
          *ngIf="
            changePasswordForm.get('newPassword')?.touched &&
            changePasswordForm.get('newPassword')?.hasError('required')
          "
        >
          Nuova password obbligatoria
        </small>

        <small
          *ngIf="
            changePasswordForm.get('newPassword')?.touched &&
            changePasswordForm.get('newPassword')?.hasError('minlength')
          "
        >
          La nuova password deve contenere almeno 8 caratteri
        </small>
      </div>

      <div class="form-group">
        <label>Conferma nuova password</label>
        <input type="password" formControlName="confirmPassword" />

        <small
          *ngIf="
            changePasswordForm.get('confirmPassword')?.touched &&
            changePasswordForm.get('confirmPassword')?.hasError('required')
          "
        >
          Conferma password obbligatoria
        </small>

        <small
          *ngIf="
            changePasswordForm.get('confirmPassword')?.touched &&
            changePasswordForm.hasError('passwordMismatch')
          "
        >
          Le password non coincidono
        </small>
      </div>

      <div *ngIf="errorMessage" class="state-box error">
        {{ errorMessage }}
      </div>

      <div *ngIf="successMessage" class="state-box success">
        {{ successMessage }}
      </div>

      <button type="submit" [disabled]="isLoading">
        {{ isLoading ? 'Salvataggio...' : 'Aggiorna password' }}
      </button>

      <button type="button" class="secondary-button" (click)="logout()" [disabled]="isLoading">
        Esci
      </button>
    </form>
  </div>
</div>
