<div class="login-container">
  <div class="login-card">
    <h1>Gym App</h1>
    <p>Accedi al gestionale</p>

    <form [formGroup]="loginForm" (ngSubmit)="onSubmit()">
      <div class="form-group">
        <label>Email</label>
        <input type="email" formControlName="email" />
        <small *ngIf="loginForm.get('email')?.touched && loginForm.get('email')?.invalid">
          Email non valida
        </small>
      </div>

      <div class="form-group">
        <label>Password</label>
        <input type="password" formControlName="password" />
        <small *ngIf="loginForm.get('password')?.touched && loginForm.get('password')?.invalid">
          Password obbligatoria
        </small>
      </div>

      <div class="state-box error" *ngIf="sessionMessage">
        {{ sessionMessage }}
      </div>

      <div *ngIf="errorMessage" class="error">
        {{ errorMessage }}
      </div>

      <button type="submit" [disabled]="isLoading">
        {{ isLoading ? 'Accesso...' : 'Login' }}
      </button>
    </form>
  </div>
</div>
