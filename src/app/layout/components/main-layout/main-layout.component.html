<div class="app-shell">
  <aside class="sidebar">
    <div class="brand">
      <h2>GymApp</h2>
      <p>Gestionale palestra</p>
    </div>

    <nav class="menu">
      <a *ngIf="isAdmin" routerLink="/admin/dashboard" routerLinkActive="active">
        Dashboard Admin
      </a>

      <a *ngIf="isManager" routerLink="/manager/dashboard" routerLinkActive="active">
        Dashboard Manager
      </a>

      <a *ngIf="isManager" routerLink="/manager/users" routerLinkActive="active">
        Utenti
      </a>

      <a *ngIf="isManager" routerLink="/manager/exercises" routerLinkActive="active">
        Esercizi
      </a>
    </nav>

    <div class="sidebar-footer">
      <button class="logout-btn" (click)="logout()">Logout</button>
    </div>
  </aside>

  <div class="main-area">
    <main class="page-content">
      <router-outlet></router-outlet>
    </main>
  </div>
</div>
